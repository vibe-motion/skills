interface:
  display_name: "Pixel2Motion"
  short_description: "Turn raster logos into smooth minimal SVG, then deliver 0.7x showcase HTML with main animation, atomic motions, and tuners."
  default_prompt: "Use $pixel2motion to turn this raster logo into a clean minimal vector and then into a choreographed logo animation. Analyze the source and write a motion brief (3 brand personality words, usage context, choreography sketch), fit the lowest-complexity smooth geometry that passes overlay QA while structuring every animatable part as an independently addressable element, audit Bezier paths for smoothness, and optimize IoU as high as practical without using a fixed global IoU threshold. Cap fitting at 10 iterations by default; stop when either an accepted smooth/structural/visual fit is reached or the 10-iteration budget is exhausted. If a lower-IoU smooth candidate ships over a higher-IoU jagged candidate, disclose why the residuals are acceptable and keep fit state resumable. Choreograph the reveal with Disney's 12 principles using the 20/50/30 anticipation-action-settle shape and personality-derived easing tokens. Build the final logo_motion.html as a showcase-style standalone HTML: main animation in #logo-root at 0.7x intrinsic SVG width, atomic motion studies, replay button, slow-motion toggle, live speed slider, principles strip, reduced-motion safety, ?t= seeking, ?static=1, and window.__p2mReady. Capture deterministic motion frames in a real browser, visually inspect the motion strip, and verify the final frame lands exactly on the verified static vector. Deliver SVG, showcase HTML, motion spec, and all QA artifacts."
